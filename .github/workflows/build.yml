name: Build & Release

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
      release_type: ${{ steps.flags.outputs.release_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || 'build action' }}
        run: |
          MSG="$COMMIT_MSG"

          RAW_VERSION="$(grep '^mod_version' gradle.properties | head -1 | sed 's/.*=//' | tr -d ' ')"
          MC_VERSION="$(grep '^minecraft_version' gradle.properties | head -1 | sed 's/.*=//' | tr -d ' ')"
          FULL_VERSION="v${MC_VERSION}-${RAW_VERSION}"

          RELEASE_TYPE="release"
          if echo "$RAW_VERSION" | grep -qi -- '-alpha'; then
            RELEASE_TYPE="alpha"
          elif echo "$RAW_VERSION" | grep -qi -- '-beta'; then
            RELEASE_TYPE="beta"
          fi

          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $FULL_VERSION"
          echo "🏷️ Release type: $RELEASE_TYPE"

          BUILD=false
          RELEASE=false

          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          echo "should_build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "📋 Flags: build=$BUILD release=$RELEASE"

  build:
    name: Build mod JAR
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon build

      - name: List build output
        run: ls -lh build/libs/

      - name: Prepare artifact
        run: |
          JAR_FILE=$(ls build/libs/*.jar | head -1)
          ASSET_NAME="lcon-${{ needs.check.outputs.version }}.jar"
          cp "$JAR_FILE" "$ASSET_NAME"
          echo "📦 Artifact: $ASSET_NAME"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset_name }}
          path: ${{ env.asset_name }}

  release:
    name: Create Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh

      - name: Delete existing release & tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          echo "🗑️ Cleaning up: $VERSION"
          gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || echo "No existing release to delete"
          sleep 2

      - name: Generate release notes
        env:
          VERSION: ${{ needs.check.outputs.version }}
          REPO: ${{ github.repository }}
          RELEASE_TYPE: ${{ needs.check.outputs.release_type }}
          TZ: Asia/Shanghai
        run: |
          PUBLISH_TIME="$(date --iso-8601=seconds)"
          PREV_TAG="$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)"

          collect_changelog() {
            local range_args=("$@")
            git log "${range_args[@]}" --pretty=format:'%s|%h|%an|%aI' --reverse \
              | grep -Evi '^chore: trigger release; build release\|' \
              | awk -F'|' '{
                  subj=$1
                  if (length(subj) > 88) subj=substr(subj, 1, 85) "..."
                  print subj " (`" $2 "`) - @" $3 " [" $4 "]"
                }'
          }

          if [ -n "$PREV_TAG" ]; then
            collect_changelog "${PREV_TAG}..HEAD" > changelog_raw.txt
          else
            collect_changelog > changelog_raw.txt
          fi

          if [ -s changelog_raw.txt ]; then
            sed 's/^/> /' changelog_raw.txt > changelog_rendered.txt
          else
            echo '> No changelog entries.' > changelog_rendered.txt
          fi

          {
            while IFS= read -r line || [ -n "$line" ]; do
              if [ "$line" = "__CHANGE_LOG__" ]; then
                cat changelog_rendered.txt
                continue
              fi
              line="${line//__REPO__/$REPO}"
              line="${line//__VERSION__/$VERSION}"
              line="${line//__RELEASE_TYPE__/$RELEASE_TYPE}"
              line="${line//__PREV_TAG__/${PREV_TAG:-N/A}}"
              line="${line//__PUBLISH_TIME__/$PUBLISH_TIME}"
              line="${line//__BRANCH__/${{ github.ref_name }}}"
              line="${line//__COMMIT_HASH__/${{ github.sha }}}"
              printf '%s\n' "$line"
            done < .github/release_template.md
          } > release_notes.md

          echo "📝 Release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          JAR_FILE=$(ls lcon-*.jar | head -1)
          echo "📤 Uploading: $JAR_FILE"
          gh release create "$VERSION" \
            --title "LCon ${VERSION}" \
            --notes-file release_notes.md \
            --latest \
            "$JAR_FILE"
